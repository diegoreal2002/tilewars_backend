services:
  - type: web
    name: tilewars-backend-preprod
    runtime: node
    plan: starter
    rootDir: tilewars_backend
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /_health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: IS_PROXIED
        value: true
      - key: CORS_ORIGIN
        value: http://localhost:3000
      - key: ENABLE_CONFLICT_WORKER
        value: true
      - key: CONFLICT_RESOLUTION_INTERVAL_MS
        value: 10000
      - key: MAINTENANCE_CHECK_INTERVAL_MS
        value: 3600000
      - key: MAINTENANCE_RUN_TOKEN
        generateValue: true
      - key: DATABASE_CLIENT
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: tilewars-backend-preprod-db
          property: connectionString
      - key: APP_KEYS
        generateValue: true
      - key: API_TOKEN_SALT
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: TRANSFER_TOKEN_SALT
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true

databases:
  - name: tilewars-backend-preprod-db
    databaseName: tilewars_backend_preprod
    user: tilewars_backend_preprod_user
    plan: basic-256mb
